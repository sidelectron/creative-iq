apiVersion: apps/v1
kind: Deployment
metadata:
  name: creativeiq-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: creativeiq-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creativeiq-frontend
    spec:
      serviceAccountName: creativeiq-frontend
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: creativeiq-frontend
                topologyKey: kubernetes.io/hostname
      volumes:
        - name: nginx-config
          configMap:
            name: creativeiq-frontend-nginx
      containers:
        - name: frontend
          image: creativeiq-frontend:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
