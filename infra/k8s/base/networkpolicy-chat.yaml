# Chat: ingress from API only; egress SQL, Redis, Snowflake/Gemini (HTTPS), DNS, metadata (WI).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: creativeiq-chat
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: creativeiq-chat
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: creativeiq-api
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
