apiVersion: apps/v1
kind: Deployment
metadata:
  name: creativeiq-profile-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: creativeiq-profile-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creativeiq-profile-engine
    spec:
      serviceAccountName: creativeiq-profile-engine
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: creativeiq-profile-engine
                topologyKey: kubernetes.io/hostname
      nodeSelector:
        workload: processing
      tolerations:
        - key: workload
          operator: Equal
          value: processing
          effect: NoSchedule
      containers:
        - name: profile-engine
          image: creativeiq-profile-engine:latest
          ports:
            - containerPort: 9101
          envFrom:
            - configMapRef:
                name: creativeiq-app-config
            - secretRef:
                name: creativeiq-app-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            tcpSocket:
              port: 9101
            initialDelaySeconds: 60
            periodSeconds: 45
          readinessProbe:
            tcpSocket:
              port: 9101
            initialDelaySeconds: 45
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
