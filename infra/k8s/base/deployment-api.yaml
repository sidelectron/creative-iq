apiVersion: apps/v1
kind: Deployment
metadata:
  name: creativeiq-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: creativeiq-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creativeiq-api
    spec:
      serviceAccountName: creativeiq-api
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: creativeiq-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: creativeiq-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: creativeiq-app-config
            - secretRef:
                name: creativeiq-app-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
