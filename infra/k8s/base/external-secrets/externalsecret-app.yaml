apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: creativeiq-app-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: creativeiq-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: REDIS_URL
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: GEMINI_API_KEY
    - secretKey: SNOWFLAKE_PASSWORD
      remoteRef:
        key: SNOWFLAKE_PASSWORD
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: JWT_SECRET_KEY
