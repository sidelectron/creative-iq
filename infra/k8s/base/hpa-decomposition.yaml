apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: creativeiq-decomposition-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: creativeiq-decomposition-worker
  # Phase 9: scale-to-zero when idle (GKE REGULAR / Kubernetes 1.27+).
  minReplicas: 0
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
