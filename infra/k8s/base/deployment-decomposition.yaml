apiVersion: apps/v1
kind: Deployment
metadata:
  name: creativeiq-decomposition-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: creativeiq-decomposition-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creativeiq-decomposition-worker
    spec:
      serviceAccountName: creativeiq-decomposition
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: creativeiq-decomposition-worker
                topologyKey: kubernetes.io/hostname
      nodeSelector:
        workload: processing
      tolerations:
        - key: workload
          operator: Equal
          value: processing
          effect: NoSchedule
      containers:
        - name: decomposition
          image: creativeiq-decomposition:latest
          ports:
            - containerPort: 9100
          envFrom:
            - configMapRef:
                name: creativeiq-app-config
            - secretRef:
                name: creativeiq-app-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            tcpSocket:
              port: 9100
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 9100
            initialDelaySeconds: 20
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
