name: CI

on:
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,google,analytics]"

      - name: Ruff
        run: python -m ruff check shared services

      - name: Pytest
        run: python -m pytest tests/unit -v

      - name: dbt compile
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          root = Path(os.environ["RUNNER_TEMP"]) / "dbt"
          root.mkdir(parents=True, exist_ok=True)
          (root / "profiles.yml").write_text(
              "creativeiq:\n"
              "  target: ci\n"
              "  outputs:\n"
              "    ci:\n"
              "      type: snowflake\n"
              "      account: ci_parse_only\n"
              "      user: ci\n"
              "      password: ci\n"
              "      role: ci\n"
              "      database: ci\n"
              "      warehouse: ci\n"
              "      schema: ci\n"
              "      threads: 1\n",
              encoding="utf-8",
          )
          PY
          cd dbt_project
          DBT_PROFILES_DIR="${RUNNER_TEMP}/dbt" python -m dbt compile --project-dir .
        shell: bash

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - name: Vitest
        working-directory: frontend
        run: npm run test
