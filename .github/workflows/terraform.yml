name: Terraform

on:
  pull_request:
    paths:
      - "infra/**"
  push:
    branches:
      - main
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      apply_target:
        description: "Terraform workspace (selects tfvars + remote state prefix)"
        type: choice
        required: true
        options:
          - dev
          - prod
      confirm:
        description: "Type APPLY to run apply for prod (dev accepts any non-empty text)"
        type: string
        required: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no remote backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

  plan:
    needs: validate
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.TF_STATE_BUCKET != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform init (remote state)
        run: |
          set -euo pipefail
          PREFIX="${{ vars.TF_STATE_PREFIX_DEV }}"
          if [ -z "$PREFIX" ]; then PREFIX="terraform/state/dev"; fi
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${PREFIX}"

      - name: Terraform plan
        id: plan
        run: |
          set -euo pipefail
          terraform plan -no-color -var-file=environments/dev/terraform.tfvars -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev-${{ github.event.pull_request.number }}
          path: infra/terraform/tfplan
          retention-days: 14

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = "infra/terraform/plan.txt";
            let body = fs.readFileSync(path, "utf8");
            const max = 60000;
            if (body.length > max) {
              body = body.slice(0, max) + "\n\n…(truncated for GitHub comment size)";
            }
            const out = "## Terraform plan (dev)\n\nRemote state + `environments/dev/terraform.tfvars`.\n\n```hcl\n" + body + "\n```";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const marker = "<!-- terraform-plan-ci -->";
            const existing = comments.find((c) =>
              c.user.type === "Bot" && c.body.includes(marker)
            );
            const payload = marker + "\n" + out;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: payload,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: payload,
              });
            }

  apply:
    needs: validate
    if: >-
      github.event_name == 'workflow_dispatch' &&
      vars.TF_STATE_BUCKET != '' &&
      (github.event.inputs.apply_target != 'prod' || github.event.inputs.confirm == 'APPLY')
    runs-on: ubuntu-latest
    environment: terraform-apply
    defaults:
      run:
        working-directory: infra/terraform
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve state prefix and tfvars
        id: cfg
        run: |
          set -euo pipefail
          TARGET="${{ github.event.inputs.apply_target }}"
          if [ "$TARGET" = "prod" ]; then
            PREFIX="${{ vars.TF_STATE_PREFIX_PROD }}"
            [ -n "$PREFIX" ] || PREFIX="terraform/state/prod"
            echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
            echo "tfvars=environments/prod/terraform.tfvars" >> "$GITHUB_OUTPUT"
          else
            PREFIX="${{ vars.TF_STATE_PREFIX_DEV }}"
            [ -n "$PREFIX" ] || PREFIX="terraform/state/dev"
            echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
            echo "tfvars=environments/dev/terraform.tfvars" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform init (remote state)
        run: |
          set -euo pipefail
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ steps.cfg.outputs.prefix }}"

      - name: Terraform apply
        run: |
          set -euo pipefail
          terraform apply -auto-approve -no-color -var-file="${{ steps.cfg.outputs.tfvars }}"
